<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCR — Azerbaijani Text Reader</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --paper: #fffdf7;
    --ink: #1a1410;
    --accent: #c0392b;
    --accent2: #e8b84b;
    --muted: #8a7f72;
    --border: #d4c9b8;
  }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    letter-spacing: -1px;
    line-height: 1;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    margin-top: 8px;
    color: var(--muted);
    font-size: 0.78rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card {
    background: var(--paper);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    width: 100%;
    max-width: 680px;
    padding: 32px;
    box-shadow: 4px 4px 0 var(--border);
  }

  .lang-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .lang-row label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    white-space: nowrap;
  }

  select {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 6px 10px;
    color: var(--ink);
    cursor: pointer;
    flex: 1;
  }

  select:focus { outline: 2px solid var(--accent); }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 4px;
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    background: var(--bg);
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #fdf5f4;
  }

  .drop-zone input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .drop-icon {
    font-size: 2.5rem;
    margin-bottom: 12px;
    display: block;
  }

  .drop-zone h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 400;
    margin-bottom: 6px;
  }

  .drop-zone p {
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .preview-wrap {
    margin-top: 20px;
    display: none;
    position: relative;
  }

  .preview-wrap img {
    width: 100%;
    border-radius: 3px;
    border: 1.5px solid var(--border);
    display: block;
    max-height: 300px;
    object-fit: contain;
    background: #eee;
  }

  .preview-clear {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50%;
    width: 28px;
    height: 28px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }

  .run-btn {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 3px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    display: none;
  }

  .run-btn:hover { background: #a93226; }
  .run-btn:active { transform: scale(0.99); }
  .run-btn:disabled { background: var(--muted); cursor: not-allowed; }

  .result-wrap {
    margin-top: 28px;
    display: none;
  }

  .result-label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    padding: 3px 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--ink);
    transition: all 0.15s;
  }

  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  textarea {
    width: 100%;
    min-height: 180px;
    padding: 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.88rem;
    line-height: 1.7;
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 3px;
    color: var(--ink);
    resize: vertical;
  }

  textarea:focus { outline: 2px solid var(--accent2); }

  .status {
    margin-top: 12px;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    min-height: 18px;
  }

  .status.error { color: var(--accent); }

  .divider {
    width: 40px;
    height: 2px;
    background: var(--accent);
    margin: 0 auto 32px;
  }
</style>
</head>
<body>

<header>
  <h1>Text<span>Lens</span></h1>
  <p>Azerbaijani OCR · Powered by Tesseract</p>
</header>
<div class="divider"></div>

<div class="card">
  <div class="lang-row">
    <label>Language</label>
    <select id="lang">
      <option value="aze">Azerbaijani</option>
      <option value="aze+eng">Azerbaijani + English</option>
      <option value="eng">English only</option>
    </select>
  </div>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" accept="image/*,.pdf,application/pdf">
    <span class="drop-icon">📄</span>
    <h2>Drop image or PDF here</h2>
    <p>or click to choose a file · PNG, JPG, TIFF, PDF</p>
  </div>

  <div class="preview-wrap" id="previewWrap">
    <img id="preview" src="" alt="Preview">
    <button class="preview-clear" id="clearBtn" title="Remove image">×</button>
  </div>

  <button class="run-btn" id="runBtn">Extract Text</button>

  <div class="result-wrap" id="resultWrap">
    <div class="result-label">
      <span>Extracted Text</span>
      <button class="copy-btn" id="copyBtn">Copy</button>
    </div>
    <textarea id="output" spellcheck="false" placeholder="Text will appear here..."></textarea>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const preview = document.getElementById('preview');
  const previewWrap = document.getElementById('previewWrap');
  const clearBtn = document.getElementById('clearBtn');
  const runBtn = document.getElementById('runBtn');
  const resultWrap = document.getElementById('resultWrap');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  const copyBtn = document.getElementById('copyBtn');
  const langSelect = document.getElementById('lang');

  let currentFile = null;
  let isPDF = false;

  function setFile(file) {
    if (!file) return;
    isPDF = file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf');
    const isImage = file.type.startsWith('image/');
    if (!isPDF && !isImage) {
      setStatus('Please select an image or PDF file.', true);
      return;
    }
    currentFile = file;
    previewWrap.style.display = 'block';
    runBtn.style.display = 'block';
    resultWrap.style.display = 'none';
    output.value = '';
    setStatus(isPDF ? 'PDF selected: ' + file.name : '');
    if (!isPDF) {
      preview.src = URL.createObjectURL(file);
    }
  }

  fileInput.addEventListener('change', e => setFile(e.target.files[0]));

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    setFile(e.dataTransfer.files[0]);
  });

  clearBtn.addEventListener('click', () => {
    currentFile = null;
    preview.src = '';
    previewWrap.style.display = 'none';
    runBtn.style.display = 'none';
    resultWrap.style.display = 'none';
    fileInput.value = '';
    setStatus('');
  });

  runBtn.addEventListener('click', async () => {
    if (!currentFile) return;
    runBtn.disabled = true;
    runBtn.textContent = 'Processing...';
    setStatus('Reading image...');

    const reader = new FileReader();
    reader.onload = async e => {
      const base64 = e.target.result.split(',')[1];
      try {
        const res = await fetch('/ocr', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: base64, lang: langSelect.value, is_pdf: isPDF })
        });
        const data = await res.json();
        output.value = data.text.trim();
        resultWrap.style.display = 'block';
        setStatus('Done.');
      } catch (err) {
        setStatus('Error connecting to server. Please try again.', true);
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Extract Text';
      }
    };
    reader.readAsDataURL(currentFile);
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(output.value);
    copyBtn.textContent = 'Copied!';
    setTimeout(() => copyBtn.textContent = 'Copy', 1500);
  });

  function setStatus(msg, isError = false) {
    status.textContent = msg;
    status.className = 'status' + (isError ? ' error' : '');
  }
</script>
</body>
</html>
